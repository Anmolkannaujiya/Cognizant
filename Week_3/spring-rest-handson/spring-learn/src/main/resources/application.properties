# =====================================================================
# Hands-On 1: application.properties
# Tomcat port configured to 8083 as used in all sample requests
# Troubleshooting Tip: Change port here if 8083 conflicts with another service
# =====================================================================
server.port=8083

# Application name
spring.application.name=spring-learn

# Enable full Spring XML context support (for ClassPathXmlApplicationContext)
spring.main.allow-bean-definition-overriding=true
